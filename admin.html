<!DOCTYPE html>
<html lang="pt-BR" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | Guia Acadêmico</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root { --primary: #0F172A; --accent: #EAB308; --bg: #F1F5F9; --card: #FFFFFF; --border: #E2E8F0; --text: #1E293B; --muted: #64748B; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 2rem; }
        header { background: var(--primary); color: #fff; padding: 1rem 0; position: sticky; top: 0; z-index: 100; }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .sidebar { background: #fff; width: 250px; height: calc(100vh - 72px); position: fixed; border-right: 1px solid var(--border); padding: 2rem; }
        .main-content { margin-left: 250px; padding: 3rem; }
        
        .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .metric-card { background: #fff; padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .metric-card h4 { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; margin-bottom: 0.5rem; }
        .metric-card div { font-size: 2rem; font-weight: 800; color: var(--primary); }

        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); }
        th { background: #f8fafc; padding: 1rem; text-align: left; font-size: 0.85rem; font-weight: 700; border-bottom: 2px solid var(--border); }
        td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        
        .status-badge { padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; }
        .status-triagem { background: #FEF9C3; color: #854D0E; }
        
        .btn-action { padding: 0.4rem 0.8rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: #fff; }
        .btn-action:hover { background: #f8fafc; }
        
        #projectModal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: #fff; margin: 5% auto; padding: 2rem; width: 80%; max-width: 800px; border-radius: 12px; max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body>

    <header>
        <div class="container header-content">
            <div style="display: flex; align-items: center; gap: 10px;">
                <img src="logo3d.png" alt="Logo" style="height: 35px; filter: brightness(0) invert(1);">
                <div style="font-weight: 800; font-size: 1.2rem;">ADMIN | GUIA ACADÊMICO</div>
            </div>
            <div style="display: flex; gap: 1.5rem; align-items: center;">
                <span id="adminName">Prof. Renato Rosa</span>
                <button onclick="handleLogout()" style="background: transparent; color: #fff; border: 1px solid #fff; padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer;">Sair</button>
            </div>
        </div>
    </header>

    <div class="sidebar">
        <nav>
            <ul style="list-style: none; display: flex; flex-direction: column; gap: 1rem;">
                <li style="font-weight: 600; color: var(--accent);">Dashboard</li>
                <li>Clientes</li>
                <li>Propostas</li>
                <li>Configurações</li>
            </ul>
        </nav>
    </div>

    <main class="main-content">
        <div class="metric-grid">
            <div class="metric-card"><h4>Novas Triagens</h4><div id="m-triagem">0</div></div>
            <div class="metric-card"><h4>Em Andamento</h4><div id="m-andamento">0</div></div>
            <div class="metric-card"><h4>Concluídos</h4><div id="m-concluido">0</div></div>
            <div class="metric-card"><h4>Total Leads</h4><div id="m-total">0</div></div>
        </div>

        <section>
            <h2 style="margin-bottom: 1.5rem;">Projetos Recentes</h2>
            <table id="projectsTable">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Cliente</th>
                        <th>Serviço</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="5" style="text-align: center;">Carregando projetos...</td></tr>
                </tbody>
            </table>
        </section>
    </main>

    <div id="projectModal">
        <div class="modal-content">
            <h2 id="modalTitle">Detalhes do Projeto</h2>
            <hr style="margin: 1rem 0;">
            <div id="modalBody" class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                <!-- Carregado via JS -->
            </div>
            <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: flex-end;">
                <button onclick="closeModal()" class="btn-action">Fechar</button>
                <button id="btnProposta" class="btn-action" style="background: var(--accent); border: none;">Criar Proposta</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, getDocs, orderBy, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { checkAdmin, logout } from './auth-cpf.js';

        if (!checkAdmin()) window.location.href = 'index.html';
        window.handleLogout = logout;

        async function loadAdminData() {
            const projectsTable = document.querySelector('#projectsTable tbody');
            projectsTable.innerHTML = '';

            const q = query(collection(db, "projects"), orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);

            let stats = { triagem: 0, andamento: 0, concluido: 0, total: 0 };

            querySnapshot.forEach(async (projectDoc) => {
                const p = projectDoc.data();
                stats.total++;
                if(p.status === 'triagem') stats.triagem++;
                if(p.status === 'em-andamento') stats.andamento++;
                if(p.status === 'concluido') stats.concluido++;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${p.createdAt.toDate().toLocaleDateString()}</td>
                    <td id="client-${projectDoc.id}">Carregando...</td>
                    <td>${p.servicoInteresse}</td>
                    <td><span class="status-badge status-triagem">${p.status}</span></td>
                    <td>
                        <button class="btn-action" onclick="viewProject('${projectDoc.id}')">Ver Mais</button>
                    </td>
                `;
                projectsTable.appendChild(tr);

                // Load Client Name
                const clientSnap = await getDoc(doc(db, "users", p.clientId));
                if(clientSnap.exists()) {
                    document.getElementById(`client-${projectDoc.id}`).innerText = clientSnap.data().nome;
                }
            });

            document.getElementById('m-triagem').innerText = stats.triagem;
            document.getElementById('m-andamento').innerText = stats.andamento;
            document.getElementById('m-concluido').innerText = stats.concluido;
            document.getElementById('m-total').innerText = stats.total;
        }

        window.viewProject = async (id) => {
            const pSnap = await getDoc(doc(db, "projects", id));
            const p = pSnap.data();
            const cSnap = await getDoc(doc(db, "users", p.clientId));
            const c = cSnap.data();

            document.getElementById('modalTitle').innerText = `Projeto: ${p.servicoInteresse}`;
            document.getElementById('modalBody').innerHTML = `
                <div>
                    <h4>Dados do Cliente</h4>
                    <p><strong>Nome:</strong> ${c.nome}</p>
                    <p><strong>WhatsApp:</strong> ${c.whatsapp}</p>
                    <p><strong>CPF:</strong> ${c.cpf}</p>
                    <p><strong>Nível:</strong> ${c.nivel || 'Não informado'}</p>
                </div>
                <div>
                    <h4>Detalhes da Solicitação</h4>
                    <p><strong>Prazo:</strong> ${p.prazoEntrega}</p>
                    <p><strong>Resumo:</strong> ${p.resumoDesafio}</p>
                    <p><strong>Status Atual:</strong> ${p.status}</p>
                </div>
            `;
            document.getElementById('projectModal').style.display = 'block';
        };

        window.closeModal = () => { document.getElementById('projectModal').style.display = 'none'; };

        loadAdminData();
    </script>
</body>
</html>
